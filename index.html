<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Flohours</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Libre Baskerville', Baskerville, Georgia, serif; }
body { display: flex; align-items: center; justify-content: center; background: #000; }

/* Spinning gradient div — much simpler than canvas */
#bgGradient {
  position: fixed;
  top: 50%; left: 50%;
  width: 300vmax; height: 300vmax;
  margin-left: -150vmax; margin-top: -150vmax;
  z-index: 0;
  animation: spinGradient 60s linear infinite;
  background: #5D4FD1; /* fallback, updated by JS */
}

@keyframes spinGradient {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

#lineCanvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

.scene {
  position: relative; z-index: 1;
  width: min(98vw, 560px);
  display: flex; flex-direction: column; align-items: center;
}

.title {
  font-weight: 400; font-size: clamp(10px, 2vw, 12px);
  letter-spacing: 0.25em; color: rgba(255,255,255,0.92); font-style: normal;
  text-align: center; margin-bottom: clamp(14px, 3vw, 24px);
  text-shadow: 0 1px 20px rgba(0,0,0,0.15);
}

.clock-wrap { position: relative; width: 100%; aspect-ratio: 1; }
#clockCanvas { width: 100%; height: 100%; display: block; }

.center-text {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center; pointer-events: none; width: 52%;
}
.center-label {
  font-size: clamp(7px, 1.2vw, 8px); letter-spacing: 0.18em;
  text-transform: uppercase; color: rgba(255,255,255,0.45); margin-bottom: 5px;
}
.center-flower {
  font-size: clamp(11px, 2vw, 14px); font-style: normal; font-weight: 400;
  color: rgba(255,255,255,0.88); line-height: 1.2;
  text-shadow: 0 2px 24px rgba(0,0,0,0.15); transition: opacity 0.8s ease;
}
.center-offline {
  font-size: clamp(10px, 1.8vw, 13px); font-style: normal; font-weight: 400;
  color: rgba(255,255,255,0.65); line-height: 1.6;
  text-shadow: 0 2px 24px rgba(0,0,0,0.15); transition: opacity 0.8s ease;
  display: none;
}

.freeze-wrap {
  margin-top: clamp(14px, 3.5vw, 24px);
  display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none;
}
.freeze-label {
  font-size: clamp(8px, 1.5vw, 10px); letter-spacing: 0.18em;
  color: rgba(255,255,255,0.55);
}
.freeze-dot {
  width: clamp(10px, 2.5vw, 14px); height: clamp(10px, 2.5vw, 14px);
  border-radius: 50%; background: rgba(255,255,255,0.35);
  border: 1px solid rgba(255,255,255,0.5); transition: background 0.3s, transform 0.3s;
}
.freeze-wrap.frozen .freeze-dot { background: rgba(255,255,255,0.75); transform: scale(1.2); }
.freeze-wrap.frozen .freeze-label { color: rgba(255,255,255,0.8); }


</style>
</head>
<body>

<div id="bgGradient"></div>
<canvas id="lineCanvas"></canvas>

<div class="scene">
  <div class="title">Flohours</div>
  <div class="clock-wrap">
    <canvas id="clockCanvas"></canvas>
    <div class="center-text">
      <div class="center-label" id="centerLabel">Current flower</div>
      <div class="center-flower" id="flowerName">Ice-Plant</div>
      <div class="center-offline" id="offlineMsg"></div>
    </div>
  </div>
  <div class="freeze-wrap" id="freezeBtn">
    <div class="freeze-label">freeze</div>
    <div class="freeze-dot"></div>
  </div>
</div>

<audio id="audioEl" preload="none" crossorigin="anonymous"></audio>



<script>
const AUDIO_URL = 'https://pub-102abf85ed564fc2bf59b333d4e4fe82.r2.dev/flohours2026.mp3';
const START_H = 10, END_H = 18, TOTAL_SECS = (END_H - START_H) * 3600;

const FLOWERS = [
  { hour: 10, name: 'Ice-Plant' },
  { hour: 11, name: "Goat's Beard" },
  { hour: 12, name: 'Sonchus' },
  { hour: 13, name: 'Proliferous Pink' },
  { hour: 14, name: 'Marsh Sowthistle' },
  { hour: 15, name: 'Pot Marigold' },
  { hour: 16, name: 'Alyssum' },
  { hour: 17, name: 'White Waterlily' },
];

let frozen = false;
let audioCtx, gainNode, audioEl;
let dpr = Math.min(window.devicePixelRatio || 1, 2);

function getNow() {
  const d = new Date();
  return { h: d.getHours(), m: d.getMinutes(), s: d.getSeconds(), ms: d.getMilliseconds() };
}
function isLive() {
  const { h } = getNow();
  return h >= START_H && h < END_H;
}
function getElapsedSecs() {
  const { h, m, s } = getNow();
  return Math.max(0, Math.min(TOTAL_SECS, (h - START_H) * 3600 + m * 60 + s));
}
function getCurrentFlower() {
  const { h } = getNow();
  const clamped = Math.max(START_H, Math.min(END_H - 1, h));
  return FLOWERS.find(f => f.hour === clamped) || FLOWERS[0];
}

// ── Clock ──
const clockCanvas = document.getElementById('clockCanvas');
const clockCtx = clockCanvas.getContext('2d');

function initClockCanvas() {
  const size = clockCanvas.offsetWidth;
  clockCanvas.width = size * dpr; clockCanvas.height = size * dpr;
  clockCtx.scale(dpr, dpr);
}

function drawClock() {
  const size = clockCanvas.offsetWidth;
  const CX = size/2, CY = size/2;
  const R = size * 0.40;
  const rHour = R * 0.46, rMin = R * 0.95;
  clockCtx.clearRect(0, 0, size, size);

  const { h, m, s, ms } = getNow();
  const totalSecs = (h - START_H) * 3600 + m * 60 + s;

  // Outer ring
  clockCtx.save();
  clockCtx.strokeStyle = 'rgba(255,255,255,1)';
  clockCtx.lineWidth = 1.4;
  clockCtx.beginPath();
  clockCtx.arc(CX, CY, R * 1.22, 0, 2 * Math.PI);
  clockCtx.stroke();
  clockCtx.restore();

  // Flower labels
  const fontSize = size * 0.024;
  const labelR = R * 1.095;
  FLOWERS.forEach((fl, i) => {
    const startAngle = (i / 8) * 2 * Math.PI + Math.PI * 1.25;
    const text = fl.name;
    clockCtx.font = `400 ${fontSize}px 'Libre Baskerville', Baskerville, Georgia, serif`;
    const charWidths = text.split('').map(ch => clockCtx.measureText(ch).width);
    const charAngles = charWidths.map(w => w / labelR);
    let a = startAngle;
    text.split('').forEach((ch, ci) => {
      const half = charAngles[ci] / 2;
      a += half;
      clockCtx.save();
      clockCtx.translate(CX, CY);
      clockCtx.rotate(a);
      clockCtx.translate(0, -labelR);
      clockCtx.font = `400 ${fontSize}px 'Libre Baskerville', Baskerville, Georgia, serif`;
      clockCtx.fillStyle = 'rgba(255,255,255,0.42)';
      clockCtx.textAlign = 'center';
      clockCtx.textBaseline = 'middle';
      clockCtx.fillText(ch, 0, 0);
      clockCtx.restore();
      a += half;
    });
  });

  // Hour numbers
  const hours = [10,11,12,13,14,15,16,17];
  hours.forEach((hr, i) => {
    const angle = (i / 8) * 2 * Math.PI + Math.PI * 0.75;
    const nr = R * 0.78;
    const x = CX + nr * Math.cos(angle), y = CY + nr * Math.sin(angle);
    const isCurrent = hr === Math.max(START_H, Math.min(END_H-1, h));
    clockCtx.save();
    clockCtx.font = `${isCurrent ? 700 : 400} ${size * (isCurrent ? 0.052 : 0.042)}px 'Libre Baskerville', Baskerville, Georgia, serif`;
    clockCtx.fillStyle = isCurrent ? 'rgba(255,255,255,0.92)' : 'rgba(255,255,255,0.45)';
    clockCtx.textAlign = 'center'; clockCtx.textBaseline = 'middle';
    clockCtx.fillText(String(hr), x, y);
    clockCtx.restore();
  });

  // Only draw dots when live
  if (!isLive()) return;

  // Hour dot
  const hourPct = Math.max(0, Math.min(1, totalSecs / TOTAL_SECS));
  const hourAngle = hourPct * 2 * Math.PI + Math.PI * 0.75;
  const hx = CX + rHour * Math.cos(hourAngle), hy = CY + rHour * Math.sin(hourAngle);
  const hGlow = clockCtx.createRadialGradient(hx, hy, 0, hx, hy, size*0.12);
  hGlow.addColorStop(0, 'rgba(255,255,245,0.45)'); hGlow.addColorStop(1, 'rgba(255,255,245,0)');
  clockCtx.save(); clockCtx.fillStyle = hGlow;
  clockCtx.beginPath(); clockCtx.arc(hx, hy, size*0.12, 0, 2*Math.PI); clockCtx.fill(); clockCtx.restore();
  clockCtx.save(); clockCtx.fillStyle = 'rgba(255,255,255,0.95)';
  clockCtx.beginPath(); clockCtx.arc(hx, hy, size*0.038, 0, 2*Math.PI); clockCtx.fill(); clockCtx.restore();

  // Minute dot with breathing
  const minPct = (s + ms / 1000) / 60;
  const minAngle = minPct * 2 * Math.PI + Math.PI * 0.75;
  const mx = CX + rMin * Math.cos(minAngle), my = CY + rMin * Math.sin(minAngle);
  const breathM = 1 + 0.18 * Math.sin(Date.now() / 1000 * (2 * Math.PI / 3));
  const mGlow = clockCtx.createRadialGradient(mx, my, 0, mx, my, size*0.08*breathM);
  mGlow.addColorStop(0, 'rgba(255,255,245,0.3)'); mGlow.addColorStop(1, 'rgba(255,255,245,0)');
  clockCtx.save(); clockCtx.fillStyle = mGlow;
  clockCtx.beginPath(); clockCtx.arc(mx, my, size*0.08*breathM, 0, 2*Math.PI); clockCtx.fill(); clockCtx.restore();
  clockCtx.save(); clockCtx.fillStyle = 'rgba(255,255,255,0.88)';
  clockCtx.beginPath(); clockCtx.arc(mx, my, size*0.022*breathM, 0, 2*Math.PI); clockCtx.fill(); clockCtx.restore();
}

// ── Vertical lines ──
function drawLines() {
  const W = window.innerWidth, H = window.innerHeight;
  const rect = document.getElementById('clockCanvas').getBoundingClientRect();
  const canvasCX = rect.left + rect.width / 2;
  const canvasCY = rect.top  + rect.height / 2;
  const outerR = rect.width * 0.40 * 1.22 / 2;
  const lx = canvasCX - outerR;
  const rx = canvasCX + outerR;
  const screenR = rect.height * 0.40 * 1.06;
  const circTop    = canvasCY - screenR;
  const circBottom = canvasCY + screenR;

  const oc = document.getElementById('lineCanvas');
  oc.width = W * dpr; oc.height = H * dpr;
  oc.style.width = W + 'px'; oc.style.height = H + 'px';
  const lctx = oc.getContext('2d');
  lctx.scale(dpr, dpr);
  lctx.clearRect(0, 0, W, H);
  lctx.strokeStyle = 'rgba(255,255,255,1)';
  lctx.lineWidth = 1.4;
  lctx.beginPath(); lctx.moveTo(lx, 0);          lctx.lineTo(lx, circTop);    lctx.stroke();
  lctx.beginPath(); lctx.moveTo(lx, circBottom);  lctx.lineTo(lx, H);          lctx.stroke();
  lctx.beginPath(); lctx.moveTo(rx, 0);           lctx.lineTo(rx, circTop);    lctx.stroke();
  lctx.beginPath(); lctx.moveTo(rx, circBottom);  lctx.lineTo(rx, H);          lctx.stroke();
}

// ── Flower name / offline state ──
let lastFlower = '';
function updateFlower() {
  const flowerEl = document.getElementById('flowerName');
  const labelEl  = document.getElementById('centerLabel');
  const offlineEl = document.getElementById('offlineMsg');

  if (isLive()) {
    const flower = getCurrentFlower().name;
    offlineEl.style.display = 'none';
    flowerEl.style.display = 'block';
    labelEl.style.display = 'block';
    if (flower !== lastFlower) {
      flowerEl.style.opacity = '0';
      setTimeout(() => { flowerEl.textContent = flower; flowerEl.style.opacity = '1'; lastFlower = flower; }, 800);
    }
  } else {
    flowerEl.style.display = 'none';
    labelEl.style.display = 'none';
    offlineEl.style.display = 'block';
    offlineEl.innerHTML = 'Flohours is between cycles.<br><br>The next bloom begins at 10:00<br>— stay watered.';
  }
}

// ── Audio ──
function initAudio() {
  audioEl = document.getElementById('audioEl');
  if (!AUDIO_URL || audioEl.src) return;
  audioEl.crossOrigin = 'anonymous';
  audioEl.src = AUDIO_URL;
  audioEl.volume = 1;
  audioEl.addEventListener('loadedmetadata', () => {
    const pos = Math.min(getElapsedSecs(), audioEl.duration - 1);
    audioEl.currentTime = pos;
    audioEl.play().then(() => {
      console.log('Playing from', pos);
    }).catch(e => console.warn('Play error:', e));
  }, { once: true });
  audioEl.addEventListener('error', e => console.warn('Audio error:', audioEl.error));
}

// ── Freeze ──
document.getElementById('freezeBtn').addEventListener('click', () => {
  frozen = !frozen;
  document.getElementById('freezeBtn').classList.toggle('frozen', frozen);
  const bg = document.getElementById('bgGradient');
  bg.style.animationPlayState = frozen ? 'paused' : 'running';
  if (audioEl) {
    if (frozen) audioEl.pause();
    else audioEl.play().catch(e => console.warn(e));
  }
});

// ── Hour colors ──
const HOUR_GRADIENT_COLORS = {
  10: ['#5D4FD1', '#717ED5'],
  11: ['#289543', '#3E9B92'],
  12: ['#958C28', '#5A8C87'],
  13: ['#955C28', '#602256'],
  14: ['#6B2D8B', '#A0255A'],
  15: ['#E8820A', '#7A2D00'],
  16: ['#91480C', '#735716'],
  17: ['#5D4FD1', '#717ED5'],
};

function hexToRgbArr(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}

function lerpHex(c1, c2, t) {
  const [r1,g1,b1] = hexToRgbArr(c1);
  const [r2,g2,b2] = hexToRgbArr(c2);
  const r = Math.round(r1 + (r2-r1)*t);
  const g = Math.round(g1 + (g2-g1)*t);
  const b = Math.round(b1 + (b2-b1)*t);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function updateGradient() {
  const { h, m } = getNow();
  const clampedH = Math.max(10, Math.min(17, h));
  const t = m / 60;
  
  const c1 = HOUR_GRADIENT_COLORS[clampedH];
  const nextH = Math.min(17, clampedH + 1);
  const c2 = HOUR_GRADIENT_COLORS[nextH];
  
  // Interpolate between current and next hour colors
  const col1 = lerpHex(c1[0], c2[0], t);
  const col2 = lerpHex(c1[1], c2[1], t);
  
  document.getElementById('bgGradient').style.background = `conic-gradient(
    from 0deg,
    ${col1} 0deg,
    ${col1} 90deg,
    ${col2} 180deg,
    ${col2} 270deg,
    ${col1} 360deg
  )`;
}

// ── Loop ──
function frame() {
  if (!frozen) { drawClock(); updateFlower(); updateGradient(); }
  drawLines();
  requestAnimationFrame(frame);
}

function init() {
  initClockCanvas();
  drawClock(); updateFlower(); updateGradient(); drawLines();
  if (AUDIO_URL) {
    // Pre-load audio src immediately so it's ready on first click
    audioEl = document.getElementById('audioEl');
    audioEl.crossOrigin = 'anonymous';
    audioEl.src = AUDIO_URL;
    audioEl.addEventListener('loadedmetadata', () => {
      const pos = Math.min(getElapsedSecs(), audioEl.duration - 1);
      audioEl.currentTime = pos;
      console.log('Audio ready at position', pos);
    }, { once: true });

    // On first click just call play() — only if live
    const startAudio = () => {
      if (!isLive()) return;
      audioEl.play().then(() => console.log('Playing!')).catch(e => console.warn('Play error:', e));
    };
    document.body.addEventListener('click', startAudio, { once: true });
    document.body.addEventListener('touchend', startAudio, { once: true });


  }
  requestAnimationFrame(frame);
}

window.addEventListener('resize', () => { dpr = Math.min(window.devicePixelRatio||1,2); initClockCanvas(); });
init();
</script>
</body>
</html>
